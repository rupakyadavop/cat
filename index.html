<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="https://plus.unsplash.com/premium_photo-1675848495392-6b9a3b962df0?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8Y3V0ZSUyMGNhdHxlbnwwfHwwfHx8MA%3D%3D">
    <title>RCat</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f1ea;
            --cream-dark: #e8e2d6;
            --accent: #f67280;
            --accent-light: #f67280;
            --text: #171717;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.75);
            --shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
       .logo-main span.ai-text {
            color: #D2D2FA; /* Lavender color */
            font-style: italic; /* Optional: if you don't want it italic like the REAR part */
            text-shadow: 0 0 10px rgba(230, 230, 250, 0.5); /* Adds a soft glow effect */
        }

        /* Fluid Typography & Base */
        * { box-sizing: border-box; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        html { font-size: 16px; }
        body {
            margin: 0; color: var(--text);
            font-family: 'Inter', sans-serif; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, .logo { font-family: 'Bodoni Moda', serif; font-weight: 700; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes drift { from { background-position: 0% 50%; } to { background-position: 100% 50%; } }
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* --- LOGIN PAGE --- */
        #login-screen {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            background: linear-gradient(-45deg, #fff, var(--bg), #fff, var(--cream-dark));
            background-size: 400% 400%; animation: drift 15s infinite alternate;
            padding: 20px;
            #login-screen {
            height: 100vh; 
            display: flex; 
           flex-direction: column;
           justify-content: center; 
           align-items: center; 
           /* Add your new background here */
           background: #CCF9FF;
           background: radial-gradient(circle, rgba(204, 249, 255, 1) 0%, rgba(124, 232, 255, 1) 25%, rgba(85, 208, 255, 1) 50%, rgba(0, 172, 223, 1) 75%, rgba(0, 128, 191, 1) 100%);
           padding: 20px;
          }
        }

        .brand-header { text-align: center; margin-bottom: 40px; animation: fadeIn 1s ease-out; }
        #dashboard {
    display: none; /* Keep this to let your JS handle the toggle */
    min-height: 100vh;
    width: 100%;
    /* Replace the URL below with your desired background image */
    background: 
         
        url('https://uploads.onecompiler.io/44ejma9dg/44fzahqr2/silhouettes-hills-street-lamps-cloudy-sky-beautiful-sunset.jpg');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    opacity: 0; /* JS will fade this in */
    transition: opacity 1s ease-in;
}
        .logo-main {
            font-size: clamp(2.5rem, 10vw, 4.5rem); letter-spacing: 12px; text-transform: uppercase;
            margin: 0; color: var(--text);
            font-style: italic;
        }
        .logo-main span { color: var(--accent); font-style: italic; text-shadow: 2px 2px 0px rgba(197, 163, 88, 0.1); }

        .login-card {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: clamp(30px, 8vw, 60px); border-radius: 4px; border: 1px solid var(--accent);
            width: 100%; max-width: 450px; box-shadow: var(--shadow);
            animation: fadeIn 1.2s ease-out;
        }

        input {
            width: 100%; padding: 15px 0; background: transparent;
            border: none; border-bottom: 2px solid var(--cream-dark); font-size: 1.2rem;
            text-align: center; outline: none; letter-spacing: 2px;
        }
        input:focus { border-bottom-color: var(--accent); transform: scale(1.02); }

        .btn-enter {
            margin-top: 40px; width: 100%; padding: 20px;
            background: var(--text); color: white; border: none;
            letter-spacing: 4px; text-transform: uppercase; cursor: pointer;
            font-size: 0.8rem; font-weight: 600;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
        }
        .btn-enter:hover { background: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(197, 163, 88, 0.3); }
        .btn-enter:active { transform: scale(0.95); }

        /* --- DASHBOARD --- */
        .navbar {
            padding: 20px clamp(20px, 5vw, 60px); display: flex; justify-content: space-between;
            align-items: center; background: var(--white); border-bottom: 1px solid var(--cream-dark);
            position: sticky; top: 0; z-index: 100;
        }

        .registry-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: clamp(20px, 4vw, 40px); padding: clamp(20px, 5vw, 60px);
            max-width: 1400px; margin: 0 auto;
        }

        .cat-card {
            background: var(--white); position: relative; overflow: hidden;
            aspect-ratio: 4/5; cursor: pointer; border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .cat-card img.preview-img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%); transition: filter 0.8s, transform 0.8s;
        }

        .cat-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
        .cat-card:hover img.preview-img { transform: scale(1.1); filter: grayscale(0%); }

        .card-overlay {
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(44, 44, 44, 0.9), transparent 60%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 25px; color: white; opacity: 0.9;
        }

        /* --- MODAL --- */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(44, 44, 44, 0.95);
            z-index: 2000; align-items: center; justify-content: center;
            padding: clamp(10px, 5vw, 50px); backdrop-filter: blur(10px);
        }

        .modal-inner { 
            display: flex; flex-direction: column; background: var(--white); 
            padding: 0; max-width: 1100px; width: 100%; overflow: hidden;
            max-height: 90vh; border-radius: 4px;
        }

        #modal-img-container { width: 100%; height: 350px; overflow: hidden; position: relative; }
        #modal-img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .modal-info { padding: 30px; display: flex; flex-direction: column; text-align: center; overflow-y: auto; }

        @media (min-width: 900px) {
            .modal-inner { flex-direction: row; height: 650px; }
            #modal-img-container { width: 55%; height: 100%; }
            .modal-info { width: 45%; text-align: left; padding: 60px; }
        }

        /* --- LOADER --- */
        #loader {
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 5000; flex-direction: column; justify-content: center; align-items: center;
        }
        .line-loader { width: 80%; max-width: 300px; height: 2px; background: var(--cream-dark); position: relative; margin-top: 20px; }
        .line-loader::after {
            content: ''; position: absolute; left: 0; width: 0%; height: 100%;
            background: var(--accent); animation: loadFill 2.5s ease-in-out forwards;
        }
        @keyframes loadFill { to { width: 100%; } }
    </style>
</head>

    <script>
       // Soulful Water Drop / Bubble Sound Effect
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSubtleClick() {
    const now = audioCtx.currentTime;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    // 1. Setup Filter (Removes harshness, makes it "underwater")
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(1000, now);

    // 2. The "Bloop" Pitch Slide
    // Starting low and sliding up creates the bubble effect
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, now); 
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.08);

    // 3. Soulful Volume Envelope
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.1, now + 0.01); // Quick attack
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3); // Long, pleasant fade

    // Connections
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    // Start and Stop
    osc.start(now);
    osc.stop(now + 0.3);
}

        let currentId = "";

        function enterRegistry() {
            const input = document.getElementById('userName').value.toLowerCase().trim();
            if (users[input]) {
                currentId = users[input];
                document.getElementById('loader').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    setTimeout(() => document.getElementById('dashboard').style.opacity = '1', 100);
                    document.getElementById('user-greeting').innerText = `WELCOME, ${input.toUpperCase()}`;
                    buildGrid();
                }, 2500);
            } else { alert("ACCESS DENIED"); }
        }

        function buildGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            cats.forEach((cat, i) => {
                const card = document.createElement('div');
                card.className = 'cat-card';
                card.innerHTML = `
                    <img src="${cat.img}" class="preview-img" alt="${cat.name}">
                    <div class="card-overlay">
                        <span style="font-size:0.6rem; letter-spacing:2px; font-weight:700;">NO. ${i+1}</span>
                        <h3 style="margin:5px 0 0 0; font-family:'Bodoni Moda'">${cat.name}</h3>
                    </div>
                `;
                card.onclick = () => openRecord(cat.name, i);
                grid.appendChild(card);
            });
        }

        function openRecord(name, index) {
            document.getElementById('catTitle').innerText = name;
            document.getElementById('descriptionText').innerText = `Displaying the unique registry connection for ${currentId.toUpperCase()}. You can Buy this Cat at only 33 $ . This digital record confirms the status of the caretaker within the RCat Staff. All rearing protocols are currently active.`;
            
            const userImages = personalImageRegistry[currentId];
            document.getElementById('userCatImage').src = userImages[index];
            
            document.getElementById('modal').style.display = 'flex';
        }
